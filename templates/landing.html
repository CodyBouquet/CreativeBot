<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CreativeBot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0e13;
    --surface: #111820;
    --card:    #141d27;
    --border:  #1e2d3d;
    --accent:  #00c8ff;
    --accent2: #0077aa;
    --text:    #c8d8e8;
    --muted:   #4a6070;
    --danger:  #ff4060;
    --success: #00e890;
    --warn:    #ffaa00;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.15;
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-badge {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .btn-sm {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-decoration: none;
    transition: border-color 0.2s;
  }

  .btn-sm:hover {
    border-color: var(--accent);
  }

  /* MAIN CONTENT */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 20px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 700px;
    width: 100%;
  }

  .tool-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 30px;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .tool-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0, 200, 255, 0.08);
  }

  .tool-icon {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .tool-icon.sync {
    background: rgba(0, 200, 255, 0.1);
    border: 1px solid rgba(0, 200, 255, 0.2);
    color: var(--accent);
  }

  .tool-icon.reports {
    background: rgba(0, 232, 144, 0.1);
    border: 1px solid rgba(0, 232, 144, 0.2);
    color: var(--success);
  }

  .tool-icon.users {
    background: rgba(255, 170, 0, 0.1);
    border: 1px solid rgba(255, 170, 0, 0.2);
    color: var(--warn);
  }

  .tool-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--text);
  }

  .tool-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* SCANLINE OVERLAY */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="brand">CREATIVEBOT</div>
  </div>
  <div class="header-right">
    <span class="user-badge">{{ username }}</span>
    <a href="/logout" class="btn-sm">Lock</a>
  </div>
</header>

<main>
  <div class="card-grid">

    <a href="/sync" class="tool-card">
      <div class="tool-icon sync">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </div>
      <div class="tool-name">SYNC</div>
      <div class="tool-desc">Pipedrive &amp; Arrivy task sync, event logs, and deal management</div>
    </a>

    <a href="/reports" class="tool-card">
      <div class="tool-icon reports">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div class="tool-name">REPORTS</div>
      <div class="tool-desc">Scheduled email reports from Rollmaster &mdash; sales, inventory, and more</div>
    </a>

    {% if is_admin %}
    <a href="/users" class="tool-card">
      <div class="tool-icon users">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="tool-name">USERS</div>
      <div class="tool-desc">Manage user accounts, roles, and PINs</div>
    </a>
    {% endif %}

  </div>
</main>

</body>
</html>
