<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CreativeBot — Users</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0e13;
    --surface: #111820;
    --card:    #141d27;
    --border:  #1e2d3d;
    --accent:  #00c8ff;
    --accent2: #0077aa;
    --text:    #c8d8e8;
    --muted:   #4a6070;
    --danger:  #ff4060;
    --success: #00e890;
    --warn:    #ffaa00;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.15;
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }
  .brand { font-family: 'Share Tech Mono', monospace; font-size: 16px; letter-spacing: 4px; color: var(--accent); }
  .brand-sub { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: var(--border); transform: scale(0.97); }
  .btn.accent { border-color: var(--accent); color: var(--accent); }
  .btn.danger { border-color: var(--danger); color: var(--danger); }

  /* Tab bar */
  .tab-bar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 9;
  }

  .tab {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 12px 8px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:active  { background: rgba(255,255,255,0.03); }

  /* Panels */
  .panel {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    position: relative;
    z-index: 1;
  }
  .panel.active { display: flex; flex-direction: column; gap: 12px; }

  .section-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Users list */
  .users-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .user-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    font-size: 12px;
  }
  .user-row:last-child { border-bottom: none; }
  .user-row.header { background: var(--surface); font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

  .username-cell { font-family: 'Share Tech Mono', monospace; color: var(--accent); }

  .role-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .role-badge.admin { background: rgba(0,200,255,0.1); color: var(--accent); border: 1px solid var(--accent2); }
  .role-badge.user  { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

  .del-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--muted);
    font-size: 14px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .del-btn:active { color: var(--danger); border-color: var(--danger); background: rgba(255,64,96,0.1); }
  .del-btn:disabled { opacity: 0.2; cursor: default; }

  /* Add user form */
  .add-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .text-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    min-height: 46px;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .text-display.has-text { border-color: var(--accent2); }

  /* QWERTY keyboard */
  .keyboard { display: flex; flex-direction: column; gap: 5px; }
  .kb-row   { display: flex; gap: 4px; justify-content: center; }

  .kb-key {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    height: 42px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    min-width: 0;
  }
  .kb-key:active  { background: var(--accent2); border-color: var(--accent); color: white; transform: scale(0.95); }
  .kb-key.kb-wide { flex: 1.6; font-size: 12px; }

  /* PIN dots */
  .pin-dots-row { display: flex; gap: 14px; justify-content: center; align-items: center; height: 36px; margin-bottom: 6px; }

  .pin-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: all 0.15s ease;
  }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

  /* Numpad */
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .nkey {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 22px;
    font-weight: 300;
    height: 58px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .nkey:active      { background: var(--accent2); border-color: var(--accent); color: white; transform: scale(0.95); }
  .nkey.nzero       { grid-column: 2; }
  .nkey.ndel        { grid-column: 3; font-size: 16px; color: var(--muted); }
  .nkey.ndel:active { color: var(--danger); border-color: var(--danger); background: rgba(255,64,96,0.1); }

  /* Role selector */
  .role-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .role-opt {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .role-opt.selected { background: var(--accent2); color: white; }

  .form-status { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); text-align: center; height: 18px; }
  .form-status.error   { color: var(--danger); }
  .form-status.success { color: var(--success); }

  .form-actions { display: flex; gap: 8px; }
  .form-actions .btn { flex: 1; text-align: center; }

  /* Access log */
  .access-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .access-row {
    display: grid;
    grid-template-columns: 1fr 140px;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    align-items: center;
  }
  .access-row:last-child { border-bottom: none; }
  .access-row.header { background: var(--surface); font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

  .access-user { font-family: 'Share Tech Mono', monospace; color: var(--accent); }
  .access-time { color: var(--muted); font-size: 10px; font-family: 'Share Tech Mono', monospace; text-align: right; }

  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="brand">CREATIVEBOT</div>
      <div class="brand-sub">User Management</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn accent" onclick="window.location.href='/'">Dashboard</button>
  </div>
</header>

<div class="tab-bar">
  <button class="tab active" id="tab-users"  onclick="showTab('users')">Users</button>
  <button class="tab"        id="tab-add"    onclick="showTab('add')">Add User</button>
  <button class="tab"        id="tab-access" onclick="showTab('access')">Access Log</button>
</div>

<!-- ── Tab: Users ──────────────────────────────────────────────────────────── -->
<div class="panel active" id="panel-users">
  <div class="users-card" id="usersList">
    <div class="user-row"><span style="color:var(--muted);grid-column:1/-1">Loading...</span></div>
  </div>
</div>

<!-- ── Tab: Add User ───────────────────────────────────────────────────────── -->
<div class="panel" id="panel-add">
  <div class="add-card">

    <div>
      <div class="field-label">Username</div>
      <div class="text-display" id="unDisplay">&#8203;</div>
      <div class="keyboard">
        <div class="kb-row">
          <button class="kb-key" onclick="kbType('1')">1</button>
          <button class="kb-key" onclick="kbType('2')">2</button>
          <button class="kb-key" onclick="kbType('3')">3</button>
          <button class="kb-key" onclick="kbType('4')">4</button>
          <button class="kb-key" onclick="kbType('5')">5</button>
          <button class="kb-key" onclick="kbType('6')">6</button>
          <button class="kb-key" onclick="kbType('7')">7</button>
          <button class="kb-key" onclick="kbType('8')">8</button>
          <button class="kb-key" onclick="kbType('9')">9</button>
          <button class="kb-key" onclick="kbType('0')">0</button>
        </div>
        <div class="kb-row">
          <button class="kb-key" onclick="kbType('q')">Q</button>
          <button class="kb-key" onclick="kbType('w')">W</button>
          <button class="kb-key" onclick="kbType('e')">E</button>
          <button class="kb-key" onclick="kbType('r')">R</button>
          <button class="kb-key" onclick="kbType('t')">T</button>
          <button class="kb-key" onclick="kbType('y')">Y</button>
          <button class="kb-key" onclick="kbType('u')">U</button>
          <button class="kb-key" onclick="kbType('i')">I</button>
          <button class="kb-key" onclick="kbType('o')">O</button>
          <button class="kb-key" onclick="kbType('p')">P</button>
        </div>
        <div class="kb-row">
          <button class="kb-key" onclick="kbType('a')">A</button>
          <button class="kb-key" onclick="kbType('s')">S</button>
          <button class="kb-key" onclick="kbType('d')">D</button>
          <button class="kb-key" onclick="kbType('f')">F</button>
          <button class="kb-key" onclick="kbType('g')">G</button>
          <button class="kb-key" onclick="kbType('h')">H</button>
          <button class="kb-key" onclick="kbType('j')">J</button>
          <button class="kb-key" onclick="kbType('k')">K</button>
          <button class="kb-key" onclick="kbType('l')">L</button>
        </div>
        <div class="kb-row">
          <button class="kb-key kb-wide" onclick="kbType('_')">_</button>
          <button class="kb-key" onclick="kbType('z')">Z</button>
          <button class="kb-key" onclick="kbType('x')">X</button>
          <button class="kb-key" onclick="kbType('c')">C</button>
          <button class="kb-key" onclick="kbType('v')">V</button>
          <button class="kb-key" onclick="kbType('b')">B</button>
          <button class="kb-key" onclick="kbType('n')">N</button>
          <button class="kb-key" onclick="kbType('m')">M</button>
          <button class="kb-key kb-wide" onclick="kbBack()">⌫</button>
        </div>
      </div>
    </div>

    <div>
      <div class="field-label">PIN</div>
      <div class="pin-dots-row">
        <div class="pin-dot" id="np0"></div>
        <div class="pin-dot" id="np1"></div>
        <div class="pin-dot" id="np2"></div>
        <div class="pin-dot" id="np3"></div>
      </div>
      <div class="numpad">
        <button class="nkey" onclick="npPress('1')">1</button>
        <button class="nkey" onclick="npPress('2')">2</button>
        <button class="nkey" onclick="npPress('3')">3</button>
        <button class="nkey" onclick="npPress('4')">4</button>
        <button class="nkey" onclick="npPress('5')">5</button>
        <button class="nkey" onclick="npPress('6')">6</button>
        <button class="nkey" onclick="npPress('7')">7</button>
        <button class="nkey" onclick="npPress('8')">8</button>
        <button class="nkey" onclick="npPress('9')">9</button>
        <button class="nkey nzero" onclick="npPress('0')">0</button>
        <button class="nkey ndel"  onclick="npDel()">⌫</button>
      </div>
    </div>

    <div>
      <div class="field-label">Role</div>
      <div class="role-toggle">
        <button class="role-opt selected" id="roleUser"  onclick="setRole('user')">User</button>
        <button class="role-opt"          id="roleAdmin" onclick="setRole('admin')">Admin</button>
      </div>
    </div>

    <div class="form-status" id="formStatus"></div>

    <div class="form-actions">
      <button class="btn" onclick="clearForm()">Clear</button>
      <button class="btn accent" onclick="submitUser()">Add User</button>
    </div>

  </div>
</div>

<!-- ── Tab: Access Log ─────────────────────────────────────────────────────── -->
<div class="panel" id="panel-access">
  <div class="access-card" id="accessLog">
    <div class="access-row"><span style="color:var(--muted);grid-column:1/-1">Loading...</span></div>
  </div>
</div>

<script>
  // ── Tabs ───────────────────────────────────────────────────────────────────
  function showTab(name) {
    ['users', 'add', 'access'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active',   t === name);
      document.getElementById('panel-' + t).classList.toggle('active', t === name);
    });
    if (name === 'users')  loadUsers();
    if (name === 'access') loadAccessLog();
  }

  // ── Username keyboard ──────────────────────────────────────────────────────
  let unText = '';

  function kbType(ch) {
    if (unText.length >= 32) return;
    unText += ch;
    renderUN();
  }

  function kbBack() {
    unText = unText.slice(0, -1);
    renderUN();
  }

  function renderUN() {
    const el = document.getElementById('unDisplay');
    el.textContent = unText || '\u200b';
    el.classList.toggle('has-text', unText.length > 0);
  }

  // ── PIN numpad ─────────────────────────────────────────────────────────────
  let npPin = '';

  function npPress(digit) {
    if (npPin.length >= 4) return;
    npPin += digit;
    renderNP();
  }

  function npDel() {
    npPin = npPin.slice(0, -1);
    renderNP();
  }

  function renderNP() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('np' + i).classList.toggle('filled', i < npPin.length);
    }
  }

  // ── Role toggle ────────────────────────────────────────────────────────────
  let selRole = 'user';

  function setRole(r) {
    selRole = r;
    document.getElementById('roleUser').classList.toggle('selected',  r === 'user');
    document.getElementById('roleAdmin').classList.toggle('selected', r === 'admin');
  }

  // ── Form ───────────────────────────────────────────────────────────────────
  function setFormStatus(msg, type) {
    const el = document.getElementById('formStatus');
    el.textContent = msg;
    el.className = 'form-status ' + type;
  }

  function clearForm() {
    unText = ''; npPin = ''; selRole = 'user';
    renderUN(); renderNP(); setRole('user'); setFormStatus('', '');
  }

  async function submitUser() {
    if (!unText.trim())   { setFormStatus('ENTER USERNAME', 'error');    return; }
    if (npPin.length < 4) { setFormStatus('ENTER 4-DIGIT PIN', 'error'); return; }
    try {
      const res  = await fetch('/api/users', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username: unText.trim(), pin: npPin, role: selRole })
      });
      const data = await res.json();
      if (res.ok) {
        setFormStatus('USER CREATED', 'success');
        clearForm();
        loadUsers();
      } else {
        setFormStatus((data.error || 'ERROR').toUpperCase(), 'error');
      }
    } catch (e) {
      setFormStatus('CONNECTION ERROR', 'error');
    }
  }

  // ── Delete user ────────────────────────────────────────────────────────────
  async function deleteUser(id, username) {
    if (!confirm(`Delete user "${username}"?`)) return;
    try {
      const res = await fetch('/api/users/' + id, { method: 'DELETE' });
      if (res.ok) loadUsers();
      else {
        const data = await res.json();
        alert(data.error || 'Failed to delete user');
      }
    } catch (e) {
      alert('Connection error');
    }
  }

  // ── Load users ─────────────────────────────────────────────────────────────
  async function loadUsers() {
    try {
      const res   = await fetch('/api/users');
      const data  = await res.json();
      const users = data.users || [];
      const el    = document.getElementById('usersList');

      if (users.length === 0) {
        el.innerHTML = '<div class="user-row"><span style="color:var(--muted);grid-column:1/-1;text-align:center">No users</span></div>';
        return;
      }

      el.innerHTML =
        '<div class="user-row header"><span>Username</span><span>Role</span><span></span></div>' +
        users.map(u => {
          const canDel = u.role !== 'admin';
          return `<div class="user-row">
            <span class="username-cell">${esc(u.username)}</span>
            <span><span class="role-badge ${u.role}">${u.role}</span></span>
            <span><button class="del-btn" onclick="deleteUser(${u.id},'${esc(u.username)}')" ${canDel ? '' : 'disabled title="Admin users cannot be deleted"'}>✕</button></span>
          </div>`;
        }).join('');
    } catch (e) {
      document.getElementById('usersList').innerHTML =
        '<div class="user-row"><span style="color:var(--muted);grid-column:1/-1">Failed to load</span></div>';
    }
  }

  // ── Load access log ────────────────────────────────────────────────────────
  async function loadAccessLog() {
    try {
      const res  = await fetch('/api/access-log');
      const data = await res.json();
      const logs = data.logs || [];
      const el   = document.getElementById('accessLog');

      if (logs.length === 0) {
        el.innerHTML = '<div class="access-row"><span style="color:var(--muted);grid-column:1/-1;text-align:center">No access events</span></div>';
        return;
      }

      el.innerHTML =
        '<div class="access-row header"><span>User</span><span>Time</span></div>' +
        logs.map(l => `
          <div class="access-row">
            <span class="access-user">${esc(l.username)}</span>
            <span class="access-time">${esc(l.logged_in_at)}</span>
          </div>`).join('');
    } catch (e) {
      document.getElementById('accessLog').innerHTML =
        '<div class="access-row"><span style="color:var(--muted);grid-column:1/-1">Failed to load</span></div>';
    }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  loadUsers();

  // Auto-lock / screen sleep
  (function() {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'display:none;position:fixed;inset:0;background:#000;z-index:9999;cursor:pointer';
    document.body.appendChild(overlay);

    let lockTimer, sleepTimer, lockMins = 0, sleepMins = 0;

    overlay.addEventListener('pointerdown', function() {
      overlay.style.display = 'none';
      resetTimers();
    });

    function resetTimers() {
      clearTimeout(lockTimer);
      clearTimeout(sleepTimer);
      if (sleepMins > 0) sleepTimer = setTimeout(() => { overlay.style.display = 'block'; }, sleepMins * 60000);
      if (lockMins  > 0) lockTimer  = setTimeout(() => { window.location.href = '/logout'; }, lockMins * 60000);
    }

    ['pointerdown', 'pointermove', 'keydown'].forEach(ev =>
      document.addEventListener(ev, resetTimers, { passive: true })
    );

    fetch('/api/settings').then(r => r.json()).then(s => {
      lockMins  = parseFloat(s.auto_lock_minutes)    || 0;
      sleepMins = parseFloat(s.screen_sleep_minutes) || 0;
      resetTimers();
    }).catch(() => {});
  })();
</script>
</body>
</html>
