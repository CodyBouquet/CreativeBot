<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CreativeBot — Email Reports</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0e13;
    --surface: #111820;
    --card:    #141d27;
    --border:  #1e2d3d;
    --accent:  #00c8ff;
    --accent2: #0077aa;
    --text:    #c8d8e8;
    --muted:   #4a6070;
    --danger:  #ff4060;
    --success: #00e890;
    --warn:    #ffaa00;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.15;
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--accent);
    text-decoration: none;
  }

  .brand-sep {
    color: var(--border);
    font-size: 18px;
  }

  .brand-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--success);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-badge {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .btn-sm {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-decoration: none;
    transition: border-color 0.2s;
  }

  .btn-sm:hover {
    border-color: var(--accent);
  }

  /* MAIN CONTENT */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 20px;
  }

  .empty-state {
    text-align: center;
    max-width: 420px;
  }

  .empty-icon {
    width: 72px;
    height: 72px;
    border-radius: 16px;
    background: rgba(0, 232, 144, 0.08);
    border: 1px solid rgba(0, 232, 144, 0.15);
    color: var(--success);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .empty-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 12px;
  }

  .empty-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .empty-desc strong {
    color: var(--text);
    font-weight: 600;
  }

  /* SCANLINE OVERLAY */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="/" class="brand">CREATIVEBOT</a>
    <span class="brand-sep">/</span>
    <span class="brand-sub">REPORTS</span>
  </div>
  <div class="header-right">
    <span class="user-badge">{{ username }}</span>
    <a href="/" class="btn-sm">Home</a>
    <a href="/logout" class="btn-sm">Lock</a>
  </div>
</header>

<main>
  <div class="empty-state">
    <div class="empty-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>
    <div class="empty-title">NO REPORTS CONFIGURED</div>
    <div class="empty-desc">
      Email reports will appear here once <strong>Microsoft Graph</strong> is connected
      and <strong>Rollmaster</strong> API access is configured.<br><br>
      Available reports: daily/weekly/monthly sales, low inventory alerts, and more.
    </div>
  </div>
</main>

</body>
</html>
