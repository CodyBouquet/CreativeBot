<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CreativeBot — Settings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0e13;
    --surface: #111820;
    --card:    #141d27;
    --border:  #1e2d3d;
    --accent:  #00c8ff;
    --accent2: #0077aa;
    --text:    #c8d8e8;
    --muted:   #4a6070;
    --danger:  #ff4060;
    --success: #00e890;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.15;
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }
  .brand     { font-family: 'Share Tech Mono', monospace; font-size: 16px; letter-spacing: 4px; color: var(--accent); }
  .brand-sub { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: var(--border); transform: scale(0.97); }
  .btn.accent { border-color: var(--accent); color: var(--accent); }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .setting-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .setting-header { display: flex; flex-direction: column; gap: 4px; }
  .setting-name   { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }
  .setting-desc   { font-size: 11px; color: var(--muted); line-height: 1.5; }

  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .pill:active   { transform: scale(0.96); }
  .pill.selected { background: var(--accent2); border-color: var(--accent); color: white; }

  .save-row {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }

  .save-btn {
    background: var(--accent2);
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: white;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .save-btn:active { opacity: 0.8; transform: scale(0.98); }

  .save-status { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); text-align: center; height: 18px; }
  .save-status.success { color: var(--success); }
  .save-status.error   { color: var(--danger); }

  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="brand">CREATIVEBOT</div>
      <div class="brand-sub">Settings</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn accent" onclick="window.location.href='/'">Dashboard</button>
  </div>
</header>

<main>

  <!-- Auto-lock -->
  <div class="setting-card">
    <div class="setting-header">
      <div class="setting-name">Auto-Lock</div>
      <div class="setting-desc">Automatically lock the screen after a period of inactivity. You will need to re-enter your PIN.</div>
    </div>
    <div class="pill-row" id="lockPills">
      <button class="pill" data-val="0"   onclick="selectLock(this)">Never</button>
      <button class="pill" data-val="1"   onclick="selectLock(this)">1 min</button>
      <button class="pill" data-val="5"   onclick="selectLock(this)">5 min</button>
      <button class="pill" data-val="10"  onclick="selectLock(this)">10 min</button>
      <button class="pill" data-val="30"  onclick="selectLock(this)">30 min</button>
    </div>
  </div>

  <!-- Screen sleep -->
  <div class="setting-card">
    <div class="setting-header">
      <div class="setting-name">Screen Sleep</div>
      <div class="setting-desc">Dim the screen after a period of inactivity. Tap anywhere to wake. Screen sleep should be shorter than auto-lock.</div>
    </div>
    <div class="pill-row" id="sleepPills">
      <button class="pill" data-val="0"  onclick="selectSleep(this)">Never</button>
      <button class="pill" data-val="1"  onclick="selectSleep(this)">1 min</button>
      <button class="pill" data-val="2"  onclick="selectSleep(this)">2 min</button>
      <button class="pill" data-val="5"  onclick="selectSleep(this)">5 min</button>
      <button class="pill" data-val="10" onclick="selectSleep(this)">10 min</button>
    </div>
  </div>

  <!-- Save -->
  <div class="save-row">
    <button class="save-btn" onclick="saveSettings()">Save Settings</button>
    <div class="save-status" id="saveStatus"></div>
  </div>

</main>

<script>
  let lockVal  = '0';
  let sleepVal = '0';

  function selectLock(btn) {
    lockVal = btn.dataset.val;
    document.querySelectorAll('#lockPills .pill').forEach(p => p.classList.toggle('selected', p === btn));
  }

  function selectSleep(btn) {
    sleepVal = btn.dataset.val;
    document.querySelectorAll('#sleepPills .pill').forEach(p => p.classList.toggle('selected', p === btn));
  }

  function selectByVal(containerId, val) {
    const match = document.querySelector(`#${containerId} [data-val="${val}"]`);
    if (match) match.click();
    else document.querySelector(`#${containerId} [data-val="0"]`).click();
  }

  async function loadSettings() {
    try {
      const res  = await fetch('/api/settings');
      const data = await res.json();
      selectByVal('lockPills',  data.auto_lock_minutes    || '0');
      selectByVal('sleepPills', data.screen_sleep_minutes || '0');
    } catch (e) {
      selectByVal('lockPills',  '0');
      selectByVal('sleepPills', '0');
    }
  }

  async function saveSettings() {
    const statusEl = document.getElementById('saveStatus');
    try {
      const res = await fetch('/api/settings', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ auto_lock_minutes: lockVal, screen_sleep_minutes: sleepVal })
      });
      if (res.ok) {
        statusEl.textContent = 'SAVED';
        statusEl.className   = 'save-status success';
      } else {
        statusEl.textContent = 'FAILED';
        statusEl.className   = 'save-status error';
      }
    } catch (e) {
      statusEl.textContent = 'CONNECTION ERROR';
      statusEl.className   = 'save-status error';
    }
    setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'save-status'; }, 2500);
  }

  loadSettings();
</script>
</body>
</html>
