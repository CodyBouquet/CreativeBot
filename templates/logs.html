<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CreativeBot — Event Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0e13;
    --surface: #111820;
    --card:    #141d27;
    --border:  #1e2d3d;
    --accent:  #00c8ff;
    --accent2: #0077aa;
    --text:    #c8d8e8;
    --muted:   #4a6070;
    --danger:  #ff4060;
    --success: #00e890;
    --warn:    #ffaa00;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.15;
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }
  .brand { font-family: 'Share Tech Mono', monospace; font-size: 16px; letter-spacing: 4px; color: var(--accent); }
  .brand-sub { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { background: var(--border); transform: scale(0.97); }
  .btn.accent { border-color: var(--accent); color: var(--accent); }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.small { padding: 4px 8px; font-size: 10px; }

  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 9;
    flex-wrap: wrap;
  }

  .filter-input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    width: 130px;
  }

  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--muted); }

  .filter-label { font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }

  .count-label { font-size: 11px; color: var(--muted); margin-left: auto; font-family: 'Share Tech Mono', monospace; }

  .filter-group { display: flex; align-items: center; gap: 6px; }

  /* Deal # input with keypad trigger */
  .deal-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .deal-input-wrap .filter-input { width: 100px; }
  .keypad-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 14px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .keypad-btn:active { background: var(--border); }

  /* Numeric keypad overlay */
  .keypad-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .keypad-overlay.open { display: flex; }

  .keypad-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 260px;
  }
  .keypad-display {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    text-align: right;
    padding: 10px 14px;
    margin-bottom: 12px;
    min-height: 44px;
    letter-spacing: 2px;
  }
  .keypad-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .keypad-key {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 18px;
    font-weight: 600;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .keypad-key:active { background: var(--border); transform: scale(0.96); }
  .keypad-key.accent { background: rgba(0,200,255,0.1); border-color: var(--accent); color: var(--accent); }
  .keypad-key.danger { background: rgba(255,64,96,0.1); border-color: var(--danger); color: var(--danger); }

  main {
    flex: 1;
    overflow-y: auto;
    position: relative;
    z-index: 1;
  }

  .log-table {
    width: 100%;
    border-collapse: collapse;
  }

  .log-table thead tr {
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .log-table th {
    padding: 10px 14px;
    text-align: left;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .log-table td {
    padding: 9px 14px;
    font-size: 11px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .log-table tbody tr:hover { background: rgba(255,255,255,0.02); }

  .deal-id { font-family: 'Share Tech Mono', monospace; color: var(--accent); }
  .event-time { color: var(--muted); font-size: 10px; font-family: 'Share Tech Mono', monospace; white-space: nowrap; }
  .event-type { color: var(--muted); font-size: 10px; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .badge.install  { background: rgba(0,200,255,0.1); color: var(--accent); border: 1px solid var(--accent2); }
  .badge.measure  { background: rgba(0,232,144,0.1); color: var(--success); border: 1px solid rgba(0,232,144,0.3); }
  .badge.delivery { background: rgba(255,170,0,0.1); color: var(--warn); border: 1px solid rgba(255,170,0,0.3); }
  .badge.unknown  { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

  .outcome { color: var(--text); line-height: 1.4; }
  .task-title { color: var(--muted); font-size: 10px; margin-top: 2px; }

  .empty-row td { text-align: center; color: var(--muted); padding: 40px; }

  /* Date input styling */
  input[type="date"].filter-input {
    width: 140px;
    color-scheme: dark;
  }

  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="brand">CREATIVEBOT</div>
      <div class="brand-sub">Event Log</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn accent" onclick="window.location.href='/sync'">Dashboard</button>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Filter</span>

  <div class="filter-group">
    <span class="filter-label">From</span>
    <input class="filter-input" id="filterFrom" type="date" onchange="loadLogs()">
  </div>
  <div class="filter-group">
    <span class="filter-label">To</span>
    <input class="filter-input" id="filterTo" type="date" onchange="loadLogs()">
  </div>

  <div class="deal-input-wrap">
    <input class="filter-input" id="filterDeal" placeholder="Deal #" type="text" inputmode="none" oninput="applyFilters()" readonly>
    <div class="keypad-btn" onclick="openKeypad()">&#9000;</div>
  </div>

  <select class="filter-input" id="filterType" onchange="applyFilters()" style="width:110px">
    <option value="">All types</option>
    <option value="install">Install</option>
    <option value="measure">Measure</option>
    <option value="delivery">Delivery</option>
    <option value="inspection">Inspection</option>
    <option value="unknown">Unknown</option>
  </select>
  <select class="filter-input" id="filterEvent" onchange="applyFilters()" style="width:130px">
    <option value="">All events</option>
    <option value="CREATED">Created</option>
    <option value="UPDATED">Updated</option>
    <option value="CANCELLED">Cancelled</option>
    <option value="COMPLETED">Completed</option>
    <option value="DELETED">Deleted</option>
    <option value="BLOCKED">Blocked</option>
  </select>
  <span class="count-label" id="countLabel">—</span>
</div>

<!-- Numeric Keypad Overlay -->
<div class="keypad-overlay" id="keypadOverlay">
  <div class="keypad-modal">
    <div class="keypad-display" id="keypadDisplay">&nbsp;</div>
    <div class="keypad-grid">
      <div class="keypad-key" onclick="keypadPress('1')">1</div>
      <div class="keypad-key" onclick="keypadPress('2')">2</div>
      <div class="keypad-key" onclick="keypadPress('3')">3</div>
      <div class="keypad-key" onclick="keypadPress('4')">4</div>
      <div class="keypad-key" onclick="keypadPress('5')">5</div>
      <div class="keypad-key" onclick="keypadPress('6')">6</div>
      <div class="keypad-key" onclick="keypadPress('7')">7</div>
      <div class="keypad-key" onclick="keypadPress('8')">8</div>
      <div class="keypad-key" onclick="keypadPress('9')">9</div>
      <div class="keypad-key danger" onclick="keypadClear()">CLR</div>
      <div class="keypad-key" onclick="keypadPress('0')">0</div>
      <div class="keypad-key accent" onclick="keypadDone()">OK</div>
    </div>
  </div>
</div>

<main>
  <table class="log-table" id="logTable">
    <thead>
      <tr>
        <th>Received</th>
        <th>Deal</th>
        <th>Event</th>
        <th>Type</th>
        <th>Task Date</th>
        <th>Task Title</th>
        <th>Action Taken</th>
      </tr>
    </thead>
    <tbody id="logBody">
      <tr class="empty-row"><td colspan="7">Loading...</td></tr>
    </tbody>
  </table>
</main>

<script>
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  let allLogs = [];

  async function loadLogs() {
    try {
      const from = document.getElementById('filterFrom').value;
      const to   = document.getElementById('filterTo').value;
      let url = '/api/logs';
      const params = [];
      if (from) params.push('from=' + from);
      if (to)   params.push('to=' + to);
      if (params.length) url += '?' + params.join('&');

      document.getElementById('logBody').innerHTML =
        '<tr class="empty-row"><td colspan="7">Loading...</td></tr>';

      const res  = await fetch(url);
      const data = await res.json();
      allLogs = data.logs || [];
      applyFilters();
    } catch (e) {
      document.getElementById('logBody').innerHTML =
        '<tr class="empty-row"><td colspan="7">Failed to load logs</td></tr>';
    }
  }

  function applyFilters() {
    const deal  = document.getElementById('filterDeal').value.trim();
    const type  = document.getElementById('filterType').value;
    const event = document.getElementById('filterEvent').value;

    const filtered = allLogs.filter(log => {
      if (deal  && String(log.deal_id) !== deal) return false;
      if (type  && log.task_type !== type)        return false;
      if (event && log.event_type !== event)      return false;
      return true;
    });

    document.getElementById('countLabel').textContent = `${filtered.length} event${filtered.length !== 1 ? 's' : ''}`;

    const tbody = document.getElementById('logBody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No events match</td></tr>';
      return;
    }

    const BADGE = { install: 'install', measure: 'measure', delivery: 'delivery', inspection: 'install' };
    tbody.innerHTML = filtered.map(log => {
      const badge = BADGE[log.task_type] || 'unknown';
      return `<tr>
        <td class="event-time">${escapeHtml(log.date)} ${escapeHtml(log.time)}</td>
        <td class="deal-id">${log.deal_id ? '#' + escapeHtml(log.deal_id) : '—'}</td>
        <td class="event-type">${escapeHtml(log.event_type)}</td>
        <td><span class="badge ${escapeHtml(badge)}">${escapeHtml(log.task_type)}</span></td>
        <td class="event-time">${escapeHtml(log.task_date)}</td>
        <td>
          <div class="task-title">${escapeHtml(log.title)}</div>
        </td>
        <td>
          <div class="outcome">${escapeHtml(log.action)}</div>
        </td>
      </tr>`;
    }).join('');
  }

  // --- Numeric Keypad ---
  let keypadValue = '';

  function openKeypad() {
    keypadValue = document.getElementById('filterDeal').value;
    document.getElementById('keypadDisplay').textContent = keypadValue || '\u00A0';
    document.getElementById('keypadOverlay').classList.add('open');
  }

  function keypadPress(digit) {
    if (keypadValue.length < 8) {
      keypadValue += digit;
      document.getElementById('keypadDisplay').textContent = keypadValue;
    }
  }

  function keypadClear() {
    keypadValue = '';
    document.getElementById('keypadDisplay').textContent = '\u00A0';
  }

  function keypadDone() {
    document.getElementById('filterDeal').value = keypadValue;
    document.getElementById('keypadOverlay').classList.remove('open');
    applyFilters();
  }

  // Close keypad on overlay tap (outside modal)
  document.getElementById('keypadOverlay').addEventListener('pointerdown', function(e) {
    if (e.target === this) {
      keypadDone();
    }
  });

  // --- Init ---
  loadLogs();
  setInterval(loadLogs, 60000);

  // SSE — push refresh on new webhook
  (function() {
    function connect() {
      const es = new EventSource('/api/stream');
      es.onmessage = function(e) { if (e.data === 'refresh') loadLogs(); };
      es.onerror   = function() { es.close(); setTimeout(connect, 5000); };
    }
    connect();
  })();

  // Auto-lock / screen sleep
  (function() {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'display:none;position:fixed;inset:0;background:#000;z-index:9999;cursor:pointer';
    document.body.appendChild(overlay);

    let lockTimer, sleepTimer, lockMins = 0, sleepMins = 0;

    overlay.addEventListener('pointerdown', function() {
      overlay.style.display = 'none';
      resetTimers();
    });

    function resetTimers() {
      clearTimeout(lockTimer);
      clearTimeout(sleepTimer);
      if (sleepMins > 0) sleepTimer = setTimeout(() => { overlay.style.display = 'block'; }, sleepMins * 60000);
      if (lockMins  > 0) lockTimer  = setTimeout(() => { window.location.href = '/logout'; }, lockMins * 60000);
    }

    ['pointerdown', 'pointermove', 'keydown'].forEach(ev =>
      document.addEventListener(ev, resetTimers, { passive: true })
    );

    fetch('/api/settings').then(r => r.json()).then(s => {
      lockMins  = parseFloat(s.auto_lock_minutes)    || 0;
      sleepMins = parseFloat(s.screen_sleep_minutes) || 0;
      resetTimers();
    }).catch(() => {});
  })();
</script>
</body>
</html>
